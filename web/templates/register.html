{{template "layout" .}}

{{define "title"}}Create Account{{end}}

{{define "content"}}
<div class="max-w-md mx-auto my-6 font-sans">
    <div class="bg-white border border-slate-200/80 shadow-md rounded-xl p-8">
        <!-- Brand & Heading -->
        <div class="text-center mb-6">
            <h1 class="text-3xl font-extrabold text-slate-800 tracking-tight flex items-center justify-center gap-2">
                <span>📝</span> Create Account
            </h1>
            <p class="text-sm text-slate-500 mt-2">Join Axiapedia to contribute and manage documents.</p>
        </div>

        <!-- Error Notification Banner -->
        {{if .Error}}
        <div class="bg-red-50 border-l-4 border-red-500 text-red-800 p-4 rounded-r mb-5 text-sm font-medium flex items-start gap-2 animate-fade-in shadow-sm select-none">
            <span class="text-base shrink-0">⚠️</span>
            <span>{{.Error}}</span>
        </div>
        {{end}}

        <!-- Form fields -->
        <form action="/register" method="POST" class="space-y-5" onsubmit="return validateRegisterForm(this)">
            <!-- Username Input -->
            <div>
                <label for="username" class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Username</label>
                <div class="relative">
                    <input type="text" name="username" id="username" required autofocus
                           value="{{if .Username}}{{.Username}}{{end}}"
                           placeholder="Letters, numbers, underscores (3-20 chars)"
                           class="w-full bg-[#f8fafc] border border-slate-200 hover:border-slate-300 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:bg-white focus:border-blue-500 focus:ring-2 focus:ring-blue-500/20 text-slate-800 transition duration-150">
                </div>
            </div>

            <!-- Password Input -->
            <div>
                <label for="password" class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Password</label>
                <div class="relative">
                    <input type="password" name="password" id="password" required
                           placeholder="Minimum 8 characters"
                           class="w-full bg-[#f8fafc] border border-slate-200 hover:border-slate-300 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:bg-white focus:border-blue-500 focus:ring-2 focus:ring-blue-500/20 text-slate-800 transition duration-150">
                </div>
            </div>

            <!-- Confirm Password Input -->
            <div>
                <label for="confirm_password" class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Confirm Password</label>
                <div class="relative">
                    <input type="password" name="confirm_password" id="confirm_password" required
                           placeholder="Repeat your password"
                           class="w-full bg-[#f8fafc] border border-slate-200 hover:border-slate-300 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:bg-white focus:border-blue-500 focus:ring-2 focus:ring-blue-500/20 text-slate-800 transition duration-150">
                </div>
            </div>

            <!-- Submit Button -->
            <button type="submit"
                    class="w-full bg-blue-600 hover:bg-blue-700 active:bg-blue-800 text-white font-bold py-3 rounded-lg shadow-md hover:shadow-lg transition duration-150 text-sm">
                Register
            </button>
        </form>

        <!-- Divider & Bottom link -->
        <div class="relative my-6 select-none">
            <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-slate-100"></div></div>
            <div class="relative flex justify-center text-xs uppercase"><span class="bg-white px-3 text-slate-400 font-semibold">Already have an account?</span></div>
        </div>

        <a href="/login"
           class="w-full block text-center bg-slate-100 hover:bg-slate-200 text-slate-700 font-semibold py-2.5 rounded-lg border border-slate-200 text-sm transition duration-150">
            Sign in
        </a>
    </div>

    <!-- Client-side form check helper -->
    <script>
        function validateRegisterForm(form) {
            const username = form.username.value.trim();
            const password = form.password.value;
            const confirm = form.confirm_password.value;

            // 1. Password mismatch check
            if (password !== confirm) {
                window.showToast('Passwords do not match.', 'error');
                return false;
            }

            // 2. Length check
            if (password.length < 8) {
                window.showToast('Password must be at least 8 characters long.', 'error');
                return false;
            }

            // 3. Username format regex
            const rx = /^[a-zA-Z0-9_]{3,20}$/;
            if (!rx.test(username)) {
                window.showToast('Invalid username format (3-20 chars, letters/numbers/underscores only).', 'error');
                return false;
            }

            return true;
        }
    </script>
</div>
{{end}}
