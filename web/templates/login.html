{{template "layout" .}}

{{define "title"}}Sign in{{end}}

{{define "content"}}
<div class="max-w-md mx-auto">
    <h1 class="text-3xl font-extrabold text-gray-800 text-center mb-6">🔐 Sign in</h1>

    {{if .Error}}
    <div class="bg-red-50 border border-red-300 text-red-700 px-4 py-3 rounded mb-4 text-sm">
        {{.Error}}
    </div>
    {{end}}

    <form action="/login" method="POST" class="space-y-4">
        <div>
            <label for="username" class="block text-sm font-semibold text-gray-700 mb-1">Username</label>
            <input type="text" name="username" id="username" required autofocus
                   class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition">
        </div>

        <div>
            <label for="password" class="block text-sm font-semibold text-gray-700 mb-1">Password</label>
            <input type="password" name="password" id="password" required
                   class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition">
        </div>

        <button type="submit"
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg shadow transition duration-200">
            Sign in
        </button>
    </form>

    <p class="text-center text-sm text-gray-500 mt-6">
        Project Axia Wiki
    </p>
</div>
{{end}}
